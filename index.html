<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的小世界 💕</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 顶部滚动进度条 -->
    <div class="scroll-progress" id="scrollProgress"></div>

    <!-- 全屏星空与流星雨画布 -->
    <canvas class="starfield" id="starfield"></canvas>

    <!-- 主题氛围过渡层：随恋爱时光轴主题切换而渐变 -->
    <div class="theme-transition-layer" id="themeTransitionLayer"></div>

    <!-- 首屏：照片墙背景 -->
    <section class="hero">
        <div class="photo-wall" id="photoWall"></div>

        <div class="hero-overlay">
            <h1>我们的小世界</h1>
            <p class="subtitle">每一张照片，都是心动的证据</p>

            <div class="counter" id="counter">
                <div><span id="years">0</span><small>年</small></div>
                <div><span id="months">0</span><small>个月</small></div>
                <div><span id="days">0</span><small>天</small></div>
                <div><span id="hours">0</span><small>时</small></div>
                <div><span id="minutes">0</span><small>分</small></div>
                <div><span id="seconds">0</span><small>秒</small></div>
            </div>
            <p class="start-date">从 <span id="startDateText"></span> 开始，一直在一起</p>
        </div>

        <div class="scroll-hint">
            <span>向下滑动，看看我们的故事</span>
            <div class="arrow">↓</div>
        </div>
    </section>

    <!-- 双面情书 -->
    <section class="love-letter-section" id="loveLetterSection">
        <div class="love-letter-scene">
            <div class="love-letter-card" id="loveLetterCard">
                <div class="love-letter-face love-letter-front">
                    <span class="letter-tag">我写给 TA</span>
                    <h2 id="loveLetterTitleFront"></h2>
                    <div class="typewriter" id="loveLetterContentFront"></div>
                    <div class="letter-actions">
                        <button class="replay-btn" id="replayFront" aria-label="重新播放">
                            <span>↻</span> 再听一遍
                        </button>
                        <button class="flip-btn" id="flipToBack" aria-label="翻到背面">
                            看看 TA 写给我的 <span>→</span>
                        </button>
                    </div>
                </div>
                <div class="love-letter-face love-letter-back">
                    <span class="letter-tag">TA 写给我</span>
                    <h2 id="loveLetterTitleBack"></h2>
                    <div class="typewriter" id="loveLetterContentBack"></div>
                    <div class="letter-actions">
                        <button class="replay-btn" id="replayBack" aria-label="重新播放">
                            <span>↻</span> 再听一遍
                        </button>
                        <button class="flip-btn" id="flipToFront" aria-label="翻回正面">
                            <span>←</span> 看看我写给 TA 的
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="section-divider"><span>•</span></div>

    <!-- 恋爱数据统计 -->
    <section class="stats-section" id="statsSection">
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-number" data-target="days" data-value="0">0</span>
                <span class="stat-label">相伴天数</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" data-target="photos" data-value="0">0</span>
                <span class="stat-label">照片总数</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" data-target="memories" data-value="0">0</span>
                <span class="stat-label">回忆片段</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" data-target="heartbeat" data-value="0">0</span>
                <span class="stat-label">心动瞬间</span>
            </div>
        </div>
    </section>

    <!-- 纪念日倒计时 -->
    <section class="anniversary-section" id="anniversarySection">
        <div class="anniversary-card">
            <span class="anniversary-label" id="anniversaryLabel">距离我们的下一个纪念日</span>
            <div class="anniversary-countdown" id="anniversaryCountdown">
                <div><span id="annDays">0</span><small>天</small></div>
                <div><span id="annHours">00</span><small>时</small></div>
                <div><span id="annMinutes">00</span><small>分</small></div>
                <div><span id="annSeconds">00</span><small>秒</small></div>
            </div>
            <p class="anniversary-date" id="anniversaryDate"></p>
        </div>
    </section>

    <div class="section-divider"><span>•</span></div>

    <!-- 足迹地图 -->
    <section class="footprint-section" id="footprintSection">
        <h2>我们的长三角回忆地图</h2>
        <div class="footprint-card">
            <div class="handdrawn-map" id="handdrawnMap">
                <svg class="map-base" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
                    <!-- 底图由 JS 注入 -->
                </svg>
                <svg class="map-route" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
                    <!-- 轨迹线由 JS 注入 -->
                </svg>
                <div class="map-markers" id="mapMarkers">
                    <!-- 地标由 JS 注入 -->
                </div>
                <div class="map-tooltip" id="mapTooltip">
                    <strong class="tooltip-name"></strong>
                    <span class="tooltip-time"></span>
                </div>
            </div>
            <div class="footprint-legend" id="footprintLegend">
                <!-- 图例由 JS 注入 -->
            </div>
        </div>
    </section>

    <div class="section-divider"><span>•</span></div>

    <!-- 时间轴 -->
    <main class="timeline-section">
        <h2>我们的恋爱时光轴</h2>
        <div class="timeline-wrap" id="timeline"></div>
    </main>

    <div class="section-divider"><span>•</span></div>

    <!-- 回忆画廊 -->
    <section class="gallery-section">
        <h2>我们的回忆碎片</h2>
        <div class="gallery-grid" id="galleryGrid"></div>
    </section>

    <div class="section-divider"><span>•</span></div>

    <!-- 她对我的意义 -->
    <section class="meaning-section" id="meaningSection">
        <h2>你对我来说</h2>
        <div class="meaning-grid" id="meaningGrid"></div>
    </section>

    <!-- 未来约定 -->
    <section class="future-section" id="futureSection">
        <h2>我们的未来约定</h2>
        <div class="future-grid" id="futureGrid"></div>
        <div class="next-milestone" id="nextMilestone"></div>
    </section>

    <!-- 生日过渡页 -->
    <section class="birthday-transition" id="birthdayTransition">
        <div class="transition-content">
            <p>好了，回忆翻完了</p>
            <h2>现在轮到今天的主角了</h2>
            <div class="arrow-hint">↓</div>
        </div>
    </section>

    <!-- 生日专属页 -->
    <section class="birthday-section" id="birthdaySection">
        <div class="birthday-content">
            <p class="birthday-pretitle" id="birthdayPretitle">给最特别的你</p>
            <h2 class="birthday-title" id="birthdayTitle">生日快乐</h2>
            <p class="birthday-subtitle" id="birthdaySubtitle">点击蜡烛，一起许愿吧</p>

            <div class="cake-container" id="cakeContainer">
                <svg class="cake" viewBox="0 0 320 260" aria-label="生日蛋糕">
                    <!-- 蛋糕托盘 -->
                    <ellipse cx="160" cy="245" rx="130" ry="22" fill="#e8d5c4" opacity="0.6"/>
                    <!-- 蛋糕底层 -->
                    <path d="M60 180 Q60 230 160 230 Q260 230 260 180 L260 130 Q260 180 160 180 Q60 180 60 130 Z" fill="#f4c2c2"/>
                    <path d="M60 130 Q60 180 160 180 Q260 180 260 130 Q260 160 160 160 Q60 160 60 130" fill="#e8a8a8"/>
                    <!-- 蛋糕上层 -->
                    <path d="M85 130 Q85 165 160 165 Q235 165 235 130 L235 90 Q235 125 160 125 Q85 125 85 90 Z" fill="#ffe4e1"/>
                    <path d="M85 90 Q85 125 160 125 Q235 125 235 90 Q235 115 160 115 Q85 115 85 90" fill="#f0c0c0"/>
                    <!-- 顶层糖霜 -->
                    <ellipse cx="160" cy="90" rx="75" ry="18" fill="#fff5f5"/>
                    <!-- 蜡烛 1 -->
                    <g class="candle" data-index="0" transform="translate(120, 55)">
                        <rect x="-6" y="0" width="12" height="35" rx="2" fill="#a18cd1"/>
                        <rect x="-6" y="0" width="12" height="8" rx="2" fill="#c4b5e0"/>
                        <path class="flame" d="M0 -4 Q-6 -18 0 -32 Q6 -18 0 -4" fill="#ffcc4d"/>
                        <circle class="flame-core" cx="0" cy="-18" r="5" fill="#ff9f43"/>
                    </g>
                    <!-- 蜡烛 2 -->
                    <g class="candle" data-index="1" transform="translate(160, 45)">
                        <rect x="-6" y="0" width="12" height="35" rx="2" fill="#8fd3f4"/>
                        <rect x="-6" y="0" width="12" height="8" rx="2" fill="#b8e3f5"/>
                        <path class="flame" d="M0 -4 Q-6 -18 0 -32 Q6 -18 0 -4" fill="#ffcc4d"/>
                        <circle class="flame-core" cx="0" cy="-18" r="5" fill="#ff9f43"/>
                    </g>
                    <!-- 蜡烛 3 -->
                    <g class="candle" data-index="2" transform="translate(200, 55)">
                        <rect x="-6" y="0" width="12" height="35" rx="2" fill="#fbc2eb"/>
                        <rect x="-6" y="0" width="12" height="8" rx="2" fill="#ffd6f0"/>
                        <path class="flame" d="M0 -4 Q-6 -18 0 -32 Q6 -18 0 -4" fill="#ffcc4d"/>
                        <circle class="flame-core" cx="0" cy="-18" r="5" fill="#ff9f43"/>
                    </g>
                    <!-- 装饰草莓 -->
                    <circle cx="110" cy="95" r="8" fill="#e74c3c"/>
                    <circle cx="210" cy="95" r="8" fill="#e74c3c"/>
                    <circle cx="160" cy="105" r="8" fill="#e74c3c"/>
                </svg>
                <p class="cake-hint" id="cakeHint">✨ 点一下蜡烛</p>
            </div>

            <div class="birthday-message" id="birthdayMessage">
                <h3>给你的话</h3>
                <div class="typewriter" id="birthdayTypewriter"></div>
            </div>
        </div>

        <!-- 烟花画布 -->
        <canvas class="fireworks" id="fireworks"></canvas>
    </section>

    <footer>
        <p>Made with ❤️ for you</p>
    </footer>

    <!-- 图片灯箱 -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose" aria-label="关闭">×</button>
        <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="上一张">‹</button>
        <img src="" alt="回忆" id="lightboxImg">
        <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="下一张">›</button>
    </div>

    <!-- 背景音乐播放器 -->
    <button class="music-player" id="musicPlayer" aria-label="播放背景音乐">
        <span class="music-icon">🎵</span>
        <span class="music-waves"><i></i><i></i><i></i></span>
    </button>
    <audio id="bgMusic" loop></audio>

    <script src="js/config.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
